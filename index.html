<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Task Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="wrapper">
        <article class="todo-card" data-testid="test-todo-card" id="main-card">
            <div class="priority-accent" data-testid="test-todo-priority-indicator"></div>

            <div id="display-mode">
                <div class="card-header">
                    <div class="title-section">
                        <h2 id="view-title" data-testid="test-todo-title">Finish Project Proposal</h2>
                        
                        <div id="collapsible-section" class="collapsed" data-testid="test-todo-collapsible-section">
                            <p id="view-description" data-testid="test-todo-description">Review the final draft and send it to the design team for feedback before the deadline. This description can be quite long to test the collapse behavior.</p>
                        </div>
                        <button id="expand-btn" class="btn-link" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="collapsible-section">Show More</button>
                    </div>

                    <div class="badges">
                        <span class="badge" id="view-priority" data-testid="test-todo-priority">High</span>
                        <span class="badge" id="view-status" data-testid="test-todo-status">Pending</span>
                    </div>
                </div>

                <div class="card-body">
                    <div class="time-mgmt">
                        <time id="view-due-date" data-testid="test-todo-due-date"></time>
                        <div class="time-row">
                            <span id="view-time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"></span>
                            <span id="overdue-indicator" class="hidden" data-testid="test-todo-overdue-indicator">⚠️ Overdue</span>
                        </div>
                    </div>
                    
                    <div class="tags-container" data-testid="test-todo-tags" role="list">
                        <span class="tag" data-testid="test-todo-tag-work">Work</span>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="footer-top">
                        <label class="toggle-container">
                            <input type="checkbox" id="complete-checkbox" data-testid="test-todo-complete-toggle">
                            <span>Mark as Done</span>
                        </label>
                        
                        <select id="status-control" data-testid="test-todo-status-control" aria-label="Change Status">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>

                    <div class="actions">
                        <button class="btn btn-edit" id="edit-btn" data-testid="test-todo-edit-button">Edit</button>
                        <button class="btn btn-delete" data-testid="test-todo-delete-button" onclick="alert('Deleted')">Delete</button>
                    </div>
                </div>
            </div>

            <form id="edit-mode" class="hidden" data-testid="test-todo-edit-form">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>
                </div>
                <div class="form-group">
                    <label for="edit-desc">Description</label>
                    <textarea id="edit-desc" data-testid="test-todo-edit-description-input"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edit-date">Due Date</label>
                        <input type="datetime-local" id="edit-date" data-testid="test-todo-edit-due-date-input">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-save" id="save-btn" data-testid="test-todo-save-button">Save</button>
                    <button type="button" class="btn btn-cancel" id="cancel-btn" data-testid="test-todo-cancel-button">Cancel</button>
                </div>
            </form>
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
